name: Python Package using Conda

on: [push]

jobs:
  guard-deprecated-actions:
    name: Guard – Deprecated GitHub Actions
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Fail if deprecated actions are referenced
      run: |
        set -euo pipefail

        DEPRECATED_ACTIONS=(
          "apisec-inc/ethicalcheck-action"
        )

        for action in "${DEPRECATED_ACTIONS[@]}"; do
          escaped_action=$(printf '%s' "$action" | sed 's/[.[\*^$()+?{|]/\\&/g')
          if rg --glob '*.yml' --glob '*.yaml' "uses:\\s*${escaped_action}(@|$)" .github/workflows; then
            echo "❌ Deprecated action detected: $action"
            exit 1
          fi
        done

        echo "✅ No deprecated actions found"

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        pip install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        pip install pytest
        pytest
