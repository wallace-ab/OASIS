Troubleshooting
Common Issues
Q: Connection timeout errors?
A: Increase  TIMEOUT  in your configuration or check network connectivity to the API endpoint.
Q: Authentication failures?
A: Verify your  API_KEY  is valid and has not expired. Check the API Dashboard.
Security
If you discover a security vulnerability, please email security@example.com rather than opening a public issue. See SECURITY.md for details.
